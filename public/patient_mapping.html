

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Section Extractor</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 1400px;
    margin: 2rem auto;
    padding: 1rem;
    color: #1a1a1a;
    background: #fafaf7;
  }
  h1 { font-size: 22px; margin: 0 0 1rem; }
  h2 { font-size: 18px; color: #333; margin: 0 0 4px; }
  input[type=file] {
    margin-bottom: 1.5rem;
    font-size: 13px;
    padding: 6px 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  thead {
    background: #f4f2ea;
    position: sticky;
    top: 0;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: #555;
    border-bottom: 1px solid rgba(0,0,0,0.12);
    white-space: nowrap;
  }
  td {
    padding: 6px 12px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    vertical-align: top;
  }
  tbody tr:hover { background: #fafaf7; }

  /* Custom Dialog Styles */
  .dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.2s ease-out;
  }
  .dialog-box {
    background: white;
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    animation: slideUp 0.3s ease-out;
  }
  .dialog-title {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 16px;
    color: #1F3864;
  }
  .dialog-input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e5e7eb;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .dialog-input:focus {
    outline: none;
    border-color: #0c447c;
  }
  .dialog-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  .dialog-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .dialog-btn-primary {
    background: #0c447c;
    color: white;
  }
  .dialog-btn-primary:hover {
    background: #083564;
  }
  .dialog-btn-secondary {
    background: #e5e7eb;
    color: #374151;
  }
  .dialog-btn-secondary:hover {
    background: #d1d5db;
  }

  /* Toast Notification Styles */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: white;
    padding: 16px 20px;
    border-radius: 8px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10001;
    animation: slideInRight 0.3s ease-out;
    max-width: 400px;
  }
  .toast-success {
    border-left: 4px solid #22c55e;
  }
  .toast-error {
    border-left: 4px solid #ef4444;
  }
  .toast-icon {
    font-size: 24px;
    line-height: 1;
  }
  .toast-content {
    flex: 1;
  }
  .toast-title {
    font-weight: 600;
    margin: 0 0 4px;
    color: #1a1a1a;
  }
  .toast-message {
    font-size: 13px;
    color: #666;
    margin: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes slideInRight {
    from {
      opacity: 0;
      transform: translateX(100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
</style>
</head>
<body>

<h1>Invoice Section Extractor</h1>
<input type="file" id="pdf-upload" accept=".pdf">

<div style="display: flex; gap: 8px; margin-bottom: 1rem;">
  <button id="tab-dme" class="tab-button active" onclick="switchTab('dme')" style="padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: #e6f1fb; cursor: pointer; font-weight: 500;">DME Invoice</button>
  <button id="tab-full" class="tab-button" onclick="switchTab('full')" style="padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer;">Full Invoice</button>
</div>

<div id="output"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Global state
let globalPatients = [];
let currentView = 'dme';
let patientCodesList = []; // List of patient codes from React app

// Column X-ranges - will be dynamically detected from header row
let COLUMNS = [
  { name: 'inv',          xStart: 20,  xEnd: 80  },
  { name: 'patient_name', xStart: 80,  xEnd: 180 },
  { name: 'address',      xStart: 180, xEnd: 330 },
  { name: 'delivery_date',xStart: 330, xEnd: 430 },
  { name: 'equipment',    xStart: 430, xEnd: 590 },
  { name: 'qty',          xStart: 590, xEnd: 635 },
  { name: 'pickup_date',  xStart: 635, xEnd: 685 },
  { name: 'rate',         xStart: 685, xEnd: 730 },
  { name: 'total',        xStart: 730, xEnd: 780 }
];

// Detect column positions from header row
function detectColumnPositions(items) {
  const headerTexts = {
    'inv': 'Inv.',
    'patient_name': 'PATIENT NAME',
    'address': 'ADDRESS & PHONE',
    'delivery_date': 'DELIVERY DATE',
    'equipment': 'EQUIPMENT DESCRIPTION',
    'qty': 'QTY/DAYS',
    'pickup_date': 'PICKUP DATE',
    'rate': 'RATE',
    'total': 'TOTAL'
  };

  const detected = {};

  // Find each header
  Object.entries(headerTexts).forEach(([key, text]) => {
    const item = items.find(it => it.text.trim() === text);
    if (item) {
      detected[key] = item.x;
    }
  });

  // If we found at least patient_name and equipment, use detected positions
  if (detected.patient_name && detected.equipment) {
    // Build array of detected columns in order
    const detectedArray = [];
    Object.keys(headerTexts).forEach(key => {
      if (detected[key] !== undefined) {
        detectedArray.push({ name: key, x: detected[key] });
      }
    });

    // Sort by X position
    detectedArray.sort((a, b) => a.x - b.x);

    // Create column ranges using MIDPOINTS between headers
    const newColumns = [];
    for (let i = 0; i < detectedArray.length; i++) {
      const current = detectedArray[i];
      const prev = detectedArray[i - 1];
      const next = detectedArray[i + 1];

      // Start at midpoint between previous and current header (or 0 for first)
      const xStart = i === 0 ? 0 : Math.floor((prev.x + current.x) / 2);

      // End at midpoint between current and next header (or 9999 for last)
      const xEnd = next ? Math.floor((current.x + next.x) / 2) : 9999;

      newColumns.push({
        name: current.name,
        xStart: xStart,
        xEnd: xEnd
      });
    }

    if (newColumns.length >= 5) {
      console.log('✓ Detected columns from headers:', newColumns);
      return newColumns;
    }
  }

  console.log('⚠ Using default column positions');
  return COLUMNS;
}

// Smart patient code matching
function findMatchingPatientCodes(patientName) {
  if (!patientName || !patientCodesList.length) return [];

  // Extract last name (last word in name)
  const nameParts = patientName.trim().split(/\s+/);
  const lastName = nameParts[nameParts.length - 1];

  if (!lastName || lastName.length < 3) return [];

  // Get first 3 characters of last name (case-insensitive)
  const searchKey = lastName.substring(0, 3).toUpperCase();

  // Find matching patient codes
  return patientCodesList.filter(p => {
    const code = typeof p === 'string' ? p : p.code;
    return code && code.toUpperCase().startsWith(searchKey);
  });
}

// Show custom dialog for date input
function showDateDialog() {
  return new Promise((resolve) => {
    // Get today's date as default
    const today = new Date().toISOString().split('T')[0];

    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';
    overlay.innerHTML = `
      <div class="dialog-box">
        <h3 class="dialog-title">Enter Invoice Date</h3>
        <input type="date" class="dialog-input" id="invoice-date-input" value="${today}">
        <div class="dialog-buttons">
          <button class="dialog-btn dialog-btn-secondary" id="dialog-cancel">Cancel</button>
          <button class="dialog-btn dialog-btn-primary" id="dialog-submit">Submit</button>
        </div>
      </div>
    `;

    document.body.appendChild(overlay);

    const input = document.getElementById('invoice-date-input');
    const submitBtn = document.getElementById('dialog-submit');
    const cancelBtn = document.getElementById('dialog-cancel');

    // Focus input
    setTimeout(() => input.focus(), 100);

    // Handle submit
    submitBtn.onclick = () => {
      const date = input.value;
      document.body.removeChild(overlay);
      resolve(date);
    };

    // Handle cancel
    cancelBtn.onclick = () => {
      document.body.removeChild(overlay);
      resolve(null);
    };

    // Handle Enter key
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        submitBtn.click();
      } else if (e.key === 'Escape') {
        cancelBtn.click();
      }
    };

    // Close on overlay click
    overlay.onclick = (e) => {
      if (e.target === overlay) {
        cancelBtn.click();
      }
    };
  });
}

// Show custom confirmation dialog
function showConfirmDialog(title, message) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';
    overlay.innerHTML = `
      <div class="dialog-box">
        <h3 class="dialog-title">${title}</h3>
        <p style="margin: 0 0 20px; color: #666; line-height: 1.5;">${message}</p>
        <div class="dialog-buttons">
          <button class="dialog-btn dialog-btn-secondary" id="dialog-cancel">Cancel</button>
          <button class="dialog-btn dialog-btn-primary" id="dialog-confirm" style="background: #ef4444;">Delete</button>
        </div>
      </div>
    `;

    document.body.appendChild(overlay);

    const confirmBtn = document.getElementById('dialog-confirm');
    const cancelBtn = document.getElementById('dialog-cancel');

    // Handle confirm
    confirmBtn.onclick = () => {
      document.body.removeChild(overlay);
      resolve(true);
    };

    // Handle cancel
    cancelBtn.onclick = () => {
      document.body.removeChild(overlay);
      resolve(false);
    };

    // Close on overlay click
    overlay.onclick = (e) => {
      if (e.target === overlay) {
        cancelBtn.click();
      }
    };

    // Handle Escape key
    document.addEventListener('keydown', function escapeHandler(e) {
      if (e.key === 'Escape') {
        cancelBtn.click();
        document.removeEventListener('keydown', escapeHandler);
      }
    });
  });
}

// Show toast notification
function showToast(title, message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `
    <div class="toast-icon">${type === 'success' ? '✅' : '❌'}</div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <p class="toast-message">${message}</p>
    </div>
  `;

  document.body.appendChild(toast);

  // Auto remove after 4 seconds
  setTimeout(() => {
    toast.style.animation = 'slideInRight 0.3s ease-out reverse';
    setTimeout(() => {
      if (document.body.contains(toast)) {
        document.body.removeChild(toast);
      }
    }, 300);
  }, 4000);
}

// Listen for patient data from parent React component
window.addEventListener('message', (event) => {
  console.log('[EVENT DATA]',event.data);
  if (event.data && event.data.type === 'PATIENT_DATA') {
    const allPatients = event.data.patientCodes || [];

    // Use all patients without filtering
    patientCodesList = allPatients;

    // Re-render if we already have extracted data
    if (globalPatients.length > 0) {
      renderCurrentView();
    }
  }
});

// Request patient data when iframe loads
window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'REQUEST_PATIENT_DATA' }, '*');
});

document.getElementById('pdf-upload').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const typedArray = new Uint8Array(ev.target.result);
    const pdf = await pdfjsLib.getDocument(typedArray).promise;

    const output = document.getElementById('output');
    output.innerHTML = '<p>Extracting…</p>';

    // ── Step 1: Collect ALL rows from ALL pages first ──
    const allRowsFromAllPages = [];

    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 1 });
      const pageHeight = viewport.height;

      // Get text items with positions
      const textContent = await page.getTextContent();
      const allItems = textContent.items
        .filter(it => it.str.trim() !== '')
        .map(it => ({
          text: it.str,
          x: it.transform[4],
          y: it.transform[5],
          width: it.width,
          height: it.height
        }));

      // Detect column positions on first page
      if (p === 1) {
        const detectedCols = detectColumnPositions(allItems);
        if (detectedCols) {
          COLUMNS = detectedCols;
        }
      }

      // Skip the CUSTOMER header block on page 1
      // Keep items BELOW the "Inv." header row (table data)
      const invHeader = allItems.find(it => it.text.trim() === 'Inv.');
      let items = allItems;

      if (p === 1 && invHeader) {
        // PDF.js uses bottom-up Y coordinates (Y increases UPWARD from bottom of page)
        // So items BELOW the header have SMALLER Y values
        // We want to KEEP items below the header (smaller Y), REMOVE items above (larger Y)
        items = allItems.filter(it => it.y < invHeader.y - 2);
      }

      // Group items into rows and assign to columns
      const pageRows = groupItemsIntoRows(items).map(assignToColumns);

      // Add all rows from this page to the master list
      allRowsFromAllPages.push(...pageRows);
    }

    // ── Step 2: Group ALL rows by patient ──
    // KEY INSIGHT from extract_reliant.py:
    // - A new patient STARTS on a row where equipment == "Daily Rate"
    //   AND the patient column contains UPPER-CASE name tokens
    // - Patient NAME = leading UPPER-CASE tokens until first token with digit
    // - Status markers "R", "GH" belong to the current patient
    // - All rows after anchor belong to that patient until next anchor

    function extractPatientName(patientCell) {
      // Extract leading UPPER-CASE tokens until we hit a digit (address starts)
      const tokens = patientCell.split(/\s+/).filter(t => t.length > 0);
      const nameToks = [];

      for (const tok of tokens) {
        // Stop at first token containing a digit (start of address)
        if (/\d/.test(tok)) {
          break;
        }
        // Only take UPPER-CASE tokens (must have at least one letter)
        if (tok === tok.toUpperCase() && /[A-Z]/.test(tok)) {
          nameToks.push(tok);
        } else {
          break; // Stop at first non-uppercase token
        }
      }

      // Convert to title case
      const result = nameToks.map(t =>
        t.charAt(0).toUpperCase() + t.slice(1).toLowerCase()
      ).join(' ');

      return result;
    }

    const allPatients = [];
    let currentPatient = null;

    for (const row of allRowsFromAllPages) {
      const equipment = (row.equipment || '').trim();
      const patientCol = (row.patient_name || '').trim();
      const totalCol = (row.total || '').trim();

      // Check for Sub-Total or TOTAL AMT (end of invoice) - stop processing
      if (Object.values(row).some(val => val && (
            val.toString().includes('Sub-Total') ||
            val.toString().includes('TOTAL AMT')
          ))) {
        break; // Stop processing rows - we've hit the footer
      }

      // ANCHOR: New patient starts when equipment == "Daily Rate"
      if (equipment === 'Daily Rate') {
        const name = extractPatientName(patientCol);

        // Only start new patient if we extracted a name
        // (Daily Rate with no name = location change for same patient)
        if (name && name.length > 2) {
          // Save previous patient
          if (currentPatient) {
            allPatients.push(currentPatient);
          }

          // Start new patient
          currentPatient = {
            patientName: name,
            address: patientCol.replace(name, '').trim() + ' ' + (row.address || '').trim(),
            status: '',
            rows: [row]
          };
          continue;
        }
      }

      // If no current patient yet, skip (header rows before first patient)
      if (!currentPatient) continue;

      // Status markers belong to current patient
      if (['R', 'GH', 'GD', 'G', 'GHS'].includes(patientCol) && !equipment) {
        currentPatient.status = patientCol;
        continue;
      }

      // Add row to current patient
      currentPatient.rows.push(row);
    }

    // Don't forget the last patient
    if (currentPatient) {
      allPatients.push(currentPatient);
    }

    // ── Store and render all patients ──
    globalPatients = allPatients;
    renderCurrentView();
  };
  reader.readAsArrayBuffer(file);
});

function switchTab(view) {
  currentView = view;

  // Update button styles
  document.getElementById('tab-full').style.background = view === 'full' ? '#e6f1fb' : 'white';
  document.getElementById('tab-full').style.fontWeight = view === 'full' ? '500' : '400';
  document.getElementById('tab-dme').style.background = view === 'dme' ? '#e6f1fb' : 'white';
  document.getElementById('tab-dme').style.fontWeight = view === 'dme' ? '500' : '400';

  renderCurrentView();
}

function renderCurrentView() {
  const output = document.getElementById('output');

  if (currentView === 'full') {
    renderFullInvoice(output, globalPatients);
  } else {
    renderDMEInvoice(output, globalPatients);
  }
}

function renderFullInvoice(container, patients) {
  container.innerHTML = '';

  // Summary header
  const header = document.createElement('div');
  header.innerHTML = `<h2 style="margin:0 0 4px;">Full Invoice Report</h2>
    <p style="color:#666;margin:0 0 1.5rem;">${patients.length} patients extracted across all pages</p>`;
  container.appendChild(header);

  // One unified table for the whole invoice
  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>Inv</th>
        <th>Patient Name</th>
        <th>Address</th>
        <th>Delivery Date</th>
        <th>Equipment</th>
        <th>Qty</th>
        <th>Pickup Date</th>
        <th>Rate</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector('tbody');

  patients.forEach((patient, idx) => {
    patient.rows.forEach((row, rowIdx) => {
      const tr = document.createElement('tr');
      // Slightly highlight the first row of each patient (where the name lives)
      if (rowIdx === 0) tr.style.borderTop = '2px solid #999';
      tr.innerHTML = `
        <td>${escapeHTML(row.inv || '')}</td>
        <td style="font-weight:${rowIdx === 0 ? '600' : '400'}">${escapeHTML(row.patient_name || '')}</td>
        <td>${escapeHTML(row.address || '')}</td>
        <td>${escapeHTML(row.delivery_date || '')}</td>
        <td>${escapeHTML(row.equipment || '')}</td>
        <td>${escapeHTML(row.qty || '')}</td>
        <td>${escapeHTML(row.pickup_date || '')}</td>
        <td>${escapeHTML(row.rate || '')}</td>
        <td style="text-align:right;">${escapeHTML(row.total || '')}</td>
      `;
      tbody.appendChild(tr);
    });
  });

  container.appendChild(table);
}

function renderDMEInvoice(container, patients) {
  container.innerHTML = '';

  // Summary header
  const header = document.createElement('div');
  const patientCodesInfo = patientCodesList.length > 0
    ? `<span style="color:#0f6e56;">✓ ${patientCodesList.length} patient codes available</span>`
    : '<span style="color:#854f0b;">⚠ Waiting for patient codes...</span>';
  header.innerHTML = `<h2 style="margin:0 0 4px;">DME Invoice Report</h2>
    <p style="color:#666;margin:0 0 0.5rem;">${patients.length} patients - Grouped by patient with totals</p>
    <p style="margin:0 0 0.5rem; font-size:12px;">${patientCodesInfo}</p>
    <p style="margin:0 0 1.5rem; font-size:11px; color:#666;">
      💡 <strong>Smart Matching:</strong> Patient codes auto-matched by last name (first 3 chars).
      Green border = auto-matched, ⭐ = suggested matches
    </p>`;
  container.appendChild(header);

  // Create grouped table
  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th style="width: 60px; text-align: center;">Delete</th>
        <th style="width: 200px;">Patient Code</th>
        <th>Patient Name</th>
        <th>Equipment</th>
        <th style="width: 120px; text-align: right;">Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector('tbody');

  // Group and aggregate data for each patient
  patients.forEach((patient, idx) => {
    const tr = document.createElement('tr');

    // Patient name - from the patient object (extracted during grouping)
    const patientName = patient.patientName || '';

    // Collect all equipment items (filter out empty values and "Daily Rate")
    const equipmentItems = patient.rows
      .map(row => row.equipment)
      .filter(eq => eq && eq.trim().length > 0 && eq.trim() !== 'Daily Rate')
      .map(eq => {
        // Clean equipment text
        let cleaned = eq;

        // Remove (PU ...) notes - e.g., "(PU 2/20)", "(PU 1/31)"
        cleaned = cleaned.replace(/\(PU[^)]*\)/gi, '').trim();

        // Replace "E-Tank,Cart,Reg" with "E-tank Cart Reg"
        if (cleaned.toLowerCase().includes('e-tank') && cleaned.includes(',')) {
          cleaned = cleaned
            .replace(/E-Tank,Cart,Reg/gi, 'E-tank Cart Reg')
            .replace(/E-Tank,\s*Cart,\s*Reg/gi, 'E-tank Cart Reg');
        }

        return cleaned;
      })
      .filter(eq => eq.length > 0); // Remove empty strings after cleaning

    const equipmentString = equipmentItems.join(', ');

    // Calculate total (sum all totals, parse dollar amounts)
    const totalAmount = patient.rows.reduce((sum, row) => {
      if (row.total) {
        const numericValue = parseFloat(row.total.replace(/[$,]/g, '')) || 0;
        return sum + numericValue;
      }
      return sum;
    }, 0);

    // Smart patient code matching
    const matchingCodes = findMatchingPatientCodes(patientName);
    const autoSelectedCode = matchingCodes.length === 1 ?
      (typeof matchingCodes[0] === 'string' ? matchingCodes[0] : matchingCodes[0].code) : '';

    // Create the select dropdown with smart matching
    const selectHtml = `
      <select style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid ${autoSelectedCode ? '#22c55e' : '#ccc'};">
        <option value="">— Select Patient Code —</option>
        ${patientCodesList.map(p => {
          const code = typeof p === 'string' ? p : p.code;
          const name = typeof p === 'string' ? '' : (p.name || '');
          const fullData = typeof p === 'string' ? null : p.fullData;
          const status = fullData?.status || '';
          const displayText = name ? `${code} - ${name}` : code;
          const statusBadge = status === 'Active' || status === 'active' ? '🟢' : '🔴';

          // Check if this code matches
          const isMatch = matchingCodes.some(m => {
            const matchCode = typeof m === 'string' ? m : m.code;
            return matchCode === code;
          });

          const selected = code === autoSelectedCode ? 'selected' : '';
          const matchIndicator = isMatch && !autoSelectedCode ? '⭐ ' : '';

          return `<option value="${escapeHTML(code)}" ${selected}>${matchIndicator}${statusBadge} ${escapeHTML(displayText)}</option>`;
        }).join('')}
      </select>
    `;

    // Smart match indicator
    const matchInfo = autoSelectedCode
      ? `<div style="font-size: 10px; color: #16a34a; margin-top: 2px;">✓ Auto-matched</div>`
      : matchingCodes.length > 1
        ? `<div style="font-size: 10px; color: #ea580c; margin-top: 2px;">⭐ ${matchingCodes.length} suggestions</div>`

      <td style="text-align: right; font-weight: 500;">$${totalAmount.toFixed(2)}</td>

    tbody.appendChild(tr);

  setTimeout(() => {

      btn.addEventListener('click', async function() {
        const rowIndex = parseInt(this.getAttribute('data-row-index'));

          'Delete Patient',
          `Are you sure you want to remove <strong>${patientName}</strong> from this invoice?`

        if (confirmed) {
          // Remove from globalPatients array
          globalPatients.splice(rowIndex, 1);

          // Re-render the view
          renderCurrentView();

          // Show success toast
          showToast('Patient Removed', `${patientName} has been removed from the invoice.`, 'success');
        }

  container.appendChild(table);

  // Calculate and show grand total
  const grandTotal = patients.reduce((sum, patient) => {
    return sum + patient.rows.reduce((rowSum, row) => {
      if (row.total) {
        return rowSum + (parseFloat(row.total.replace(/[$,]/g, '')) || 0);
      }
      return rowSum;
    }, 0);

  // Grand Total row
  const totalRow = document.createElement('div');
  totalRow.style.cssText = 'margin-top: 1rem; text-align: right;';
  totalRow.innerHTML = `
    <div style="font-size: 16px; font-weight: 600;">Grand Total: $${grandTotal.toFixed(2)}</div>

async function handleSubmitInvoice() {
  // Validate that all patients have selected codes
  const table = document.querySelector('#output table tbody');
  const rows = table.querySelectorAll('tr');
  const invoiceItems = [];
  let hasError = false;

  rows.forEach((row, idx) => {
    const select = row.querySelector('select');
    const patientCd = select ? select.value : '';

    if (!patientCd) {
      hasError = true;
      select.style.border = '2px solid #ef4444';
      return;
    } else {
      select.style.border = '';
    }

    const patient = globalPatients[idx];
    if (!patient) return;

    const patientName = patient.patientName ||
                       (patient.rows.length > 0 ? patient.rows[0].patient_name : '');

    // Collect equipment
    const equipmentItems = patient.rows
      .map(row => row.equipment)
      .filter(eq => eq && eq.trim().length > 0 && eq.trim() !== 'Daily Rate')
      .map(eq => {
        let cleaned = eq;
        cleaned = cleaned.replace(/\(PU[^)]*\)/gi, '').trim();
        if (cleaned.toLowerCase().includes('e-tank') && cleaned.includes(',')) {
          cleaned = cleaned
            .replace(/E-Tank,Cart,Reg/gi, 'E-tank Cart Reg')
            .replace(/E-Tank,\s*Cart,\s*Reg/gi, 'E-tank Cart Reg');
        }
        return cleaned;
      })
      .filter(eq => eq.length > 0);

    // Remove duplicates (case-insensitive)
    const uniqueEquipmentItems = equipmentItems.filter((item, index, self) => {
      const normalizedItem = item.trim().toLowerCase();
      return index === self.findIndex(e => e.trim().toLowerCase() === normalizedItem);
    });

    // Calculate total
    const totalAmount = patient.rows.reduce((sum, row) => {
      if (row.total) {
        return sum + (parseFloat(row.total.replace(/[$,]/g, '')) || 0);
      }
      return sum;
    }, 0);

    invoiceItems.push({
      patientCd: patientCd,
      patientName: patientName,
      equipments: uniqueEquipmentItems,
      invoice_amt: totalAmount
    });
  });

  if (hasError) {
    showToast('Validation Error', 'Please select a patient code for all patients before submitting.', 'error');
    return;
  }

  // Ask for invoice date using custom dialog
  const invoiceDate = await showDateDialog();

  if (!invoiceDate) {
    return; // User cancelled
  }

  // Send data back to parent component
  window.parent.postMessage({
    type: 'SUBMIT_DME_INVOICE',
    data: {
      invoice_dt: invoiceDate,
      items: invoiceItems
    }
  }, '*');

  console.log('✓ Submitted DME Invoice:', { invoice_dt: invoiceDate, items: invoiceItems });

  // Show success toast
  showToast('Invoice Submitted!', `Successfully submitted invoice for ${invoiceItems.length} patients on ${invoiceDate}`, 'success');

  // Close modal and return to DME management after short delay
  setTimeout(() => {
    window.parent.postMessage({ type: 'CLOSE_INVOICE_MODAL' }, '*');
  }, 1500);
}

// ────────────────────────────────────────────────────────────────
// Find horizontal border lines using the page operator list.
// PDF.js draws lines/rectangles as path operations. A horizontal
// border is any path whose y-range is tiny and whose x-range is wide.
// ────────────────────────────────────────────────────────────────
async function getHorizontalBorders(page, pageHeight) {
  const ops = await page.getOperatorList();
  const OPS = pdfjsLib.OPS;
  const borders = [];

  for (let i = 0; i < ops.fnArray.length; i++) {
    const fn = ops.fnArray[i];
    // constructPath carries the path commands + coordinates
    if (fn === OPS.constructPath) {
      const args = ops.argsArray[i];
      // args[0] = array of op codes (moveTo, lineTo, rectangle, etc.)
      // args[1] = flat array of coordinates
      const pathOps = args[0];
      const coords = args[1];

      // Check for rectangle op (op code 19) — your PDF draws borders as rects
      let idx = 0;
      for (const op of pathOps) {
        if (op === OPS.rectangle) {
          const x = coords[idx], y = coords[idx+1];
          const w = coords[idx+2], h = coords[idx+3];
          idx += 4;
          // Thin and wide → horizontal border
          if (Math.abs(h) < 2 && Math.abs(w) > 500) {
            borders.push(y); // bottom-up Y
          }
        } else if (op === OPS.moveTo || op === OPS.lineTo) {
          idx += 2;
        } else if (op === OPS.curveTo) {
          idx += 6;
        } else if (op === OPS.curveTo2 || op === OPS.curveTo3) {
          idx += 4;
        }
      }
    }
  }

  // Also add top and bottom of page as implicit borders
  // so the top-most and bottom-most sections are bounded
  borders.push(pageHeight);
  borders.push(0);

  // Dedupe nearby Y-values (within 2pt of each other)
  const unique = [];
  borders.sort((a, b) => b - a).forEach(y => {
    if (!unique.length || Math.abs(unique[unique.length-1] - y) > 2) {
      unique.push(y);
    }
  });
  return unique;
}

// ────────────────────────────────────────────────────────────────
// Group items with similar Y into rows
// ────────────────────────────────────────────────────────────────
function groupItemsIntoRows(items, yTolerance = 3) {
  const rowMap = new Map();
  items.forEach(it => {
    let matchedKey = null;
    for (const key of rowMap.keys()) {
      if (Math.abs(key - it.y) < yTolerance) { matchedKey = key; break; }
    }
    const key = matchedKey ?? it.y;
    if (!rowMap.has(key)) rowMap.set(key, []);
    rowMap.get(key).push(it);
  });
  // Return rows sorted top-to-bottom (higher y first)
  return [...rowMap.entries()]
    .sort((a, b) => b[0] - a[0])
    .map(([y, rowItems]) => rowItems.sort((a, b) => a.x - b.x));
}

// ────────────────────────────────────────────────────────────────
// Assign each item in a row to its column based on X position
// ────────────────────────────────────────────────────────────────
function assignToColumns(rowItems) {
  const row = {};
  COLUMNS.forEach(c => row[c.name] = '');
  rowItems.forEach(it => {
    const col = COLUMNS.find(c => it.x >= c.xStart && it.x < c.xEnd);
    if (col) {
      row[col.name] = (row[col.name] + ' ' + it.text).trim();
    }
  });
  return row;
}

// ────────────────────────────────────────────────────────────────
// Escape HTML
// ────────────────────────────────────────────────────────────────
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
